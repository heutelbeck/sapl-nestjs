name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # `npm ci` installs strictly from package-lock.json and fails on any
      # lockfile/package.json drift. The lockfile carries SHA-512 integrity
      # hashes for every resolved tarball, so an upstream re-publish under
      # an existing version is detected at install time.
      - run: npm ci
      - run: npm run build
      - run: npm test
