name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # `npm ci` installs strictly from package-lock.json and fails on any
      # lockfile/package.json drift. The lockfile carries SHA-512 integrity
      # hashes for every resolved tarball, so an upstream re-publish under
      # an existing version is detected at install time.
      - run: npm ci
      - run: npm run build
      - run: npm test

  integration-tests:
    runs-on: ubuntu-latest
    # Integration tests use testcontainers: Mongo (and Postgres for the
    # Prisma shim) come up per-test, while the PDP transport tests need a
    # sapl-node image. The image is the published release pulled from ghcr.io;
    # the IT suite resolves the tag via SAPL_NODE_IMAGE.
    env:
      SAPL_NODE_IMAGE: ghcr.io/heutelbeck/sapl-node:4.1.2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Pull SAPL Node image
        run: docker pull "$SAPL_NODE_IMAGE"

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:it
